<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}لوحة الإدارة - مغسلة المرونة{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* القوائم المنسدلة في السيدبار */
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .submenu.open { max-height: 500px; transition: max-height 0.5s ease-in; }
        .rotate-180 { transform: rotate(180deg); }
        /* تخصيص السكرول للمحتوى المتغير */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex h-screen text-gray-800 overflow-hidden">

    <aside class="w-72 bg-white border-x border-gray-200 flex flex-col shadow-sm z-20 flex-shrink-0 transition-all duration-300">
        <div class="h-16 flex items-center justify-center border-b border-gray-100 px-6">
            <h1 class="text-xl font-black text-blue-900 tracking-tight flex items-center gap-2">
                <span class="text-3xl">👔</span>
                <span data-i18n="title">مغسلة المرونة</span>
            </h1>
        </div>

        <div class="p-4">
            <a href="/orders/management/" class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-md transition">
                <span>🖥️</span> <span data-i18n="posBtn">نقطة البيع (POS)</span>
            </a>
        </div>

        <nav class="flex-1 overflow-y-auto scrollbar-hide px-3 pb-4 space-y-1">
            <a href="/admin-dashboard/" class="flex items-center gap-3 px-3 py-2.5 bg-blue-50 text-blue-700 rounded-lg font-bold transition">
                <span class="text-lg">📊</span> <span data-i18n="navMain">الرئيسية</span>
            </a>

            <div>
                <button onclick="toggleMenu('laundryMenu', 'laundryIcon')" class="w-full flex items-center justify-between px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg font-bold transition">
                    <div class="flex items-center gap-3"><span class="text-lg text-gray-400">👕</span> <span data-i18n="navLaundry">إدارة المغسلة</span></div>
                    <span id="laundryIcon" class="text-gray-400 transition-transform">▼</span>
                </button>
                <div id="laundryMenu" class="submenu px-8 space-y-1 mt-1">
                    <a href="/items-management/" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium transition" data-i18n="navItems">الأصناف (Items)</a>
                    <a href="/customers-management/" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium transition" data-i18n="navCustomers">العملاء (Customers)</a>
                </div>
            </div>

            <div>
                <button onclick="toggleMenu('stockMenu', 'stockIcon')" class="w-full flex items-center justify-between px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg font-bold transition">
                    <div class="flex items-center gap-3"><span class="text-lg text-gray-400">📦</span> <span data-i18n="navStock">إدارة المخزون</span></div>
                    <span id="stockIcon" class="text-gray-400 transition-transform">▼</span>
                </button>
                <div id="stockMenu" class="submenu px-8 space-y-1 mt-1">
                    <a href="#" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium transition">المنتجات</a>
                    <a href="#" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium transition">تقرير المخزون</a>
                </div>
            </div>
        </nav>
        
        <div class="p-4 border-t border-gray-100">
            <a href="/logout/" class="flex items-center justify-center gap-2 w-full border border-gray-200 text-gray-600 hover:bg-red-50 hover:text-red-600 rounded-lg font-bold py-2 transition">
                <span data-i18n="btnLogout">تسجيل الخروج</span> <span>🚪</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm z-10 flex-shrink-0">
            <div>
                <h2 class="text-2xl font-black text-gray-800">{% block header_title %}{% endblock %}</h2>
                <p class="text-xs text-gray-500 font-medium" id="current-date">--:--</p>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-gray-700 transition flex items-center gap-2">
                    🌐 <span id="lang-btn-text">English</span>
                </button>
                <div class="flex items-center gap-3 border-r pr-4">
                    <div class="text-left">
                        <p class="text-sm font-bold text-gray-800 leading-none" data-i18n="adminName">مدير النظام</p>
                        <p class="text-xs text-gray-500 mt-1">Admin</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold shadow-inner">A</div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-[#f8fafc] custom-scroll">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script>
        // دالة فتح/إغلاق القوائم المنسدلة في السيدبار
        function toggleMenu(menuId, iconId) {
            const menu = document.getElementById(menuId);
            const icon = document.getElementById(iconId);
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
                icon.classList.remove('rotate-180');
            } else {
                menu.classList.add('open');
                icon.classList.add('rotate-180');
            }
        }

        // دالة تغيير اللغة والاتجاه (Flexbox يحرك السيدبار تلقائياً)
        function toggleLanguage() {
            const root = document.getElementById('html-root');
            const btnText = document.getElementById('lang-btn-text');
            if (root.dir === 'rtl') {
                root.dir = 'ltr'; root.lang = 'en'; btnText.innerText = 'عربي';
            } else {
                root.dir = 'rtl'; root.lang = 'ar'; btnText.innerText = 'English';
            }
        }

        // تحديث التاريخ
        function updateDate() {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-date').innerText = new Date().toLocaleString('ar-QA', options);
        }
        updateDate();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
