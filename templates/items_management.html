<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Items Management - Almarona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); z-index: 100; }
        /* إخفاء شريط التمرير لشريط التصنيفات ليكون أنيق مثل الصورة */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-200 shadow-sm z-10 flex-shrink-0 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="/admin-dashboard/" class="text-gray-500 hover:text-blue-600 font-bold text-lg transition flex items-center gap-2">
                ⬅ Back
            </a>
            <span class="text-2xl">👕</span>
            <h1 class="text-2xl font-black text-gray-800 tracking-wide">Items Management</h1>
        </div>
        <a href="{% url 'export_service_catalog_excel' %}" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition shadow-md">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
    <span>تصدير الكتالوج (Export Catalog)</span>
</a>
        <button onclick="openItemModal()" class="bg-[#007ec5] hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-bold shadow-md transition flex items-center gap-2">
            <span>+</span> Add New Item
        </button>
    </header>

    <div class="flex-1 overflow-y-auto p-6 flex flex-col">
        
        <div class="mb-6">
            <div class="relative w-full max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                <input type="text" id="search-input" onkeyup="renderItems()" placeholder="Search items to edit..." class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:border-[#007ec5] focus:ring-1 focus:ring-[#007ec5] shadow-sm text-sm">
            </div>
        </div>

     <div class="relative flex items-center mb-2">
            <button onclick="scrollCategories(-300)" class="absolute left-0 z-20 bg-white shadow-lg border border-gray-200 rounded-full w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-[#007ec5] hover:text-white transition top-1/2 -translate-y-1/2 font-bold text-xl pb-1 cursor-pointer">
                &#8249;
            </button>
            
            <div id="category-bar" class="flex items-center gap-2.5 overflow-x-auto pt-6 pb-4 scrollbar-hide w-full px-10 scroll-smooth">
                </div>

            <button onclick="scrollCategories(300)" class="absolute right-0 z-20 bg-white shadow-lg border border-gray-200 rounded-full w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-[#007ec5] hover:text-white transition top-1/2 -translate-y-1/2 font-bold text-xl pb-1 cursor-pointer">
                &#8250;
            </button>
        </div>
        <div id="items-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5 pb-10">
            <p class="text-gray-500 col-span-full">Loading items...</p>
        </div>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-[850px] max-h-[90vh] flex flex-col overflow-hidden">
            
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-black text-gray-800 text-xl" id="modal-title">Add/Edit Item</h3>
                <button onclick="closeItemModal()" class="text-gray-400 hover:text-red-500 text-2xl font-bold transition">&times;</button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 bg-white">
                <form id="itemForm" class="space-y-6">
                    <input type="hidden" id="itemId">

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Item Image *</label>
                            <input type="file" id="itemImage" accept="image/*" class="w-full border-2 border-dashed border-blue-300 hover:border-blue-500 rounded-lg p-2 text-sm text-gray-600 file:mr-4 file:py-1.5 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-[#007ec5] cursor-pointer focus:outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Item Name *</label>
                            <input type="text" id="itemNameEn" placeholder="e.g. Abaya" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-[#007ec5] outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Category *</label>
                                <select id="itemCategory" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-[#007ec5] outline-none">
                                    <option value="">Select Category</option>
                                </select>
                            </div>
                            </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Item Arabic Name</label>
                            <input type="text" id="itemNameAr" dir="rtl" placeholder="مثال: عباية" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-[#007ec5] outline-none">
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-4">
                        <h4 class="font-bold text-gray-800 mb-3">Services</h4>
                        <div class="space-y-4">
                            
                            <div class="border border-gray-200 rounded-lg p-4 bg-white shadow-sm hover:border-blue-200 transition">
                                <label class="flex items-center gap-2 cursor-pointer mb-3">
                                    <input type="checkbox" id="hasWashing" class="w-4 h-4 text-[#007ec5] rounded border-gray-300 focus:ring-[#007ec5]" onchange="togglePriceInputs('Washing')">
                                    <span class="font-bold text-gray-800">Washing</span>
                                </label>
                                <div class="grid grid-cols-2 gap-4 opacity-50 pointer-events-none transition-opacity duration-300" id="inputsWashing">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Normal Price</label>
                                        <input type="number" step="0.5" id="washNormal" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Express Price</label>
                                        <input type="number" step="0.5" id="washExpress" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                </div>
                            </div>

                            <div class="border border-gray-200 rounded-lg p-4 bg-white shadow-sm hover:border-blue-200 transition">
                                <label class="flex items-center gap-2 cursor-pointer mb-3">
                                    <input type="checkbox" id="hasDryClean" class="w-4 h-4 text-[#007ec5] rounded border-gray-300 focus:ring-[#007ec5]" onchange="togglePriceInputs('DryClean')">
                                    <span class="font-bold text-gray-800">Dry Cleaning</span>
                                </label>
                                <div class="grid grid-cols-2 gap-4 opacity-50 pointer-events-none transition-opacity duration-300" id="inputsDryClean">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Normal Price</label>
                                        <input type="number" step="0.5" id="dryNormal" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Express Price</label>
                                        <input type="number" step="0.5" id="dryExpress" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                </div>
                            </div>

                            <div class="border border-gray-200 rounded-lg p-4 bg-white shadow-sm hover:border-blue-200 transition">
                                <label class="flex items-center gap-2 cursor-pointer mb-3">
                                    <input type="checkbox" id="hasIroning" class="w-4 h-4 text-[#007ec5] rounded border-gray-300 focus:ring-[#007ec5]" onchange="togglePriceInputs('Ironing')">
                                    <span class="font-bold text-gray-800">Ironing</span>
                                </label>
                                <div class="grid grid-cols-2 gap-4 opacity-50 pointer-events-none transition-opacity duration-300" id="inputsIroning">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Normal Price</label>
                                        <input type="number" step="0.5" id="ironNormal" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1">Express Price</label>
                                        <input type="number" step="0.5" id="ironExpress" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-[#007ec5]">
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </form>
            </div>

            <div class="px-6 py-4 bg-white border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeItemModal()" class="px-6 py-2 border border-gray-300 text-gray-600 font-bold rounded-lg hover:bg-gray-50 transition shadow-sm">Cancel</button>
                <button onclick="saveItem()" id="btnSave" class="px-8 py-2 bg-[#007ec5] hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition">Save Changes</button>
            </div>

        </div>
    </div>
    <div id="categoryModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-[150]">
        <div class="bg-white rounded-2xl shadow-2xl w-[400px] p-6 relative">
            <button onclick="closeCategoryModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-xl">&times;</button>
            <h3 class="text-xl font-black text-gray-800 mb-1 flex items-center gap-2">🏷️ Add New Category</h3>
            <p class="text-xs text-gray-500 mb-5">Enter the name for the new category.</p>
            
            <input type="text" id="newCategoryInput" placeholder="e.g. Winter Clothes" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 mb-6 text-sm font-bold focus:outline-none focus:border-[#007ec5] focus:ring-1 focus:ring-[#007ec5]">
            
            <div class="flex justify-end gap-3">
                <button onclick="closeCategoryModal()" class="px-5 py-2 border border-gray-300 text-gray-600 rounded-lg font-bold text-sm hover:bg-gray-50 transition shadow-sm">Cancel</button>
                <button onclick="submitCustomCategory()" class="px-6 py-2 bg-[#007ec5] text-white rounded-lg font-bold text-sm hover:bg-blue-700 transition shadow-md">Save Category</button>
            </div>
        </div>
    </div>
    <script>
        let allItems = [];
        let categories = [];
        let selectedCategoryFilter = 'All'; 

        async function fetchInitialData() {
            try {
                const catRes = await fetch('/api/services/categories/'); 
                if(catRes.ok) {
                    const catData = await catRes.json();
                    categories = Array.isArray(catData) ? catData : (catData.results || []);
                }
                
                const itemsRes = await fetch('/api/services/items/');
                if(itemsRes.ok) {
                    const itemData = await itemsRes.json();
                    allItems = Array.isArray(itemData) ? itemData : (itemData.results || []);
                    
                    renderCategoryBar(); 
                    renderItems();       
                }
            } catch(e) { console.error("Error loading data", e); }
        }

        // 🌟 رسم شريط التصنيفات بشكل مطابق للتصميم 🌟
        function renderCategoryBar() {
            const bar = document.getElementById('category-bar');
            
            // زر All Items الأزرق
            let html = `
                <button onclick="setCategoryFilter('All')" class="shrink-0 px-6 py-2 rounded-full font-bold text-sm transition-all shadow-sm border ${selectedCategoryFilter === 'All' ? 'bg-[#007ec5] text-white border-[#007ec5]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">
                    All Items
                </button>
            `;
            
            // أزرار التصنيفات
            categories.forEach(c => {
                const isActive = (selectedCategoryFilter === String(c.id));
                const baseClass = isActive ? 'bg-[#007ec5] text-white border-[#007ec5]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50 hover:border-gray-300';
                
                // 🌟 إخفاء زر الحذف عن القسم الافتراضي (Uncategorized) 🌟
                const isDefault = (c.name.toLowerCase() === 'uncategorized' || c.name === 'غير مصنف');
                const deleteBtn = isDefault ? '' : `<button onclick="deleteCategory(${c.id}, event)" class="absolute -top-1.5 -right-1 w-5 h-5 flex items-center justify-center rounded-full bg-red-500 text-white shadow-md z-10 opacity-0 group-hover:opacity-100 transition hover:bg-red-700 font-bold text-[10px]" title="Delete Category">✕</button>`;

                html += `
                <div class="relative group shrink-3">
                    <button onclick="setCategoryFilter('${c.id}')" class="px-6 py-2 rounded-full font-bold text-sm transition-all shadow-sm border ${baseClass}">
                        ${c.name}
                    </button>
                    ${deleteBtn}
                </div>`;
            });

            // 🌟 زر الإضافة السريع في آخر شريط التصنيفات 🌟
            html += `
                <button onclick="openCategoryModal()" class="shrink-0 px-5 py-2 rounded-full font-bold text-sm transition-all border border-dashed border-gray-400 text-gray-500 hover:bg-gray-100 flex items-center gap-1">
                    <span>+</span> New Category
                </button>
            `;

            bar.innerHTML = html;
        }

        function setCategoryFilter(id) {
            selectedCategoryFilter = String(id);
            renderCategoryBar();
            renderItems();
        }

        // 🌟 فتح نافذة التصنيف الجديدة 🌟
        function openCategoryModal() {
            document.getElementById('categoryModal').classList.remove('hidden');
            document.getElementById('newCategoryInput').value = '';
            setTimeout(() => document.getElementById('newCategoryInput').focus(), 100);
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden');
        }

        async function submitCustomCategory() {
            const name = document.getElementById('newCategoryInput').value.trim();
            if (!name) return alert("Please enter a category name.");
            
            try {
                const res = await fetch('/api/services/categories/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                    body: JSON.stringify({ name: name })
                });
                if (res.ok) {
                    fetchInitialData(); 
                    closeCategoryModal(); // قفل النافذة بعد النجاح
                } else alert("Error creating category. It might already exist.");
            } catch (e) { alert("Network Error"); }
        }

        async function deleteCategory(id, event) {
            event.stopPropagation(); 
            if(!confirm("Are you sure you want to delete this category? Items inside will become uncategorized.")) return;
            
            // 💡 هنا سحبنا مفتاح الأمان عشان السيرفر يرضى يحذف
            const csrfToken = getCookie('csrftoken');

            try {
                const res = await fetch(`/api/services/categories/${id}/`, {
                    method: 'DELETE',
                    headers: { 
                        'Content-Type': 'application/json', // 👈 إضافة مهمة
                        'X-CSRFToken': csrfToken // 👈 إرسال مفتاح الأمان هنا
                    }
                });
                
                if (res.ok) {
                    if (selectedCategoryFilter === String(id)) selectedCategoryFilter = 'All'; 
                    fetchInitialData(); 
                } else {
                    const errorMsg = await res.text();
                    alert("Cannot delete category. Server details: " + errorMsg);
                }
            } catch(e) { 
                alert("Network Error while deleting category."); 
            }
        }

        // 🌟 رسم كروت المنتجات لتطابق الصور 🌟
        function renderItems() {
            const grid = document.getElementById('items-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = allItems.filter(i => {
                const nameEn = (i.name_en || i.name || "").toLowerCase();
                const nameAr = (i.name || "").toLowerCase();
                const matchesSearch = nameEn.includes(search) || nameAr.includes(search);
                const itemCatId = String(i.category || i.category_id);
                const matchesCategory = (selectedCategoryFilter === 'All') || (itemCatId === selectedCategoryFilter);
                
                return matchesSearch && matchesCategory;
            });

            let html = filtered.map(item => {
                // أيقونة التيشيرت الرمادية اللطيفة إذا لم توجد صورة
                const placeholder = `
                    <div class="w-full h-full bg-gray-50 flex items-center justify-center">
                        <svg class="w-16 h-16 text-gray-200" fill="currentColor" viewBox="0 0 24 24"><path d="M21.435 6.435l-3.35-3.35A1.995 1.995 0 0016.671 2.5H7.329c-.53 0-1.039.211-1.414.586l-3.35 3.35A1.995 1.995 0 002.5 7.85v11.65A2.502 2.502 0 005 22h14a2.502 2.502 0 002.5-2.5V7.85c0-.53-.211-1.039-.565-1.415zM12 4.5c1.38 0 2.5 1.12 2.5 2.5h-5c0-1.38 1.12-2.5 2.5-2.5z"/></svg>
                    </div>`;

                const img = item.image 
                    ? `<img src="${item.image}" class="w-full h-full object-contain" alt="${item.name}">` 
                    : placeholder;
                
                let wPrice = parseFloat(item.washing_price) || 0;
                let dPrice = parseFloat(item.dry_cleaning_price) || 0;
                let iPrice = parseFloat(item.ironing_price) || 0;

                let displayEn = item.name_en || item.name || '---';
                let displayAr = item.name || '';
                if (displayEn.toLowerCase() === displayAr.toLowerCase()) displayAr = '';

                // تصميم الكرت المطابق تماماً للصورة
                return `
                <div class="relative group h-full">
                    <button onclick="deleteItem(${item.id}, event)" class="absolute -top-2 -right-2 w-7 h-7 flex items-center justify-center rounded-full bg-red-500 text-white shadow-md z-30 opacity-0 group-hover:opacity-100 transition hover:bg-red-700" title="Delete Item">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    
                    <div onclick="openEditModal(${item.id})" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-full hover:shadow-lg hover:border-blue-300 transition-all duration-300 cursor-pointer">
                        <div class="h-44 bg-white relative flex items-center justify-center border-b border-gray-100 overflow-hidden">
                            <span class="absolute top-3 right-3 bg-white px-2.5 py-0.5 rounded text-[11px] text-[#007ec5] font-bold border border-[#007ec5] shadow-sm z-10">${item.category_name_en || item.category_name || 'Uncategorized'}</span>
                            <div class="absolute inset-0 z-20 bg-[#007ec5]/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300"></div>
                            ${img}
                        </div>
                        <div class="p-4 flex flex-col flex-1 bg-white">
                            <h3 class="font-bold text-gray-900 text-lg leading-tight truncate mb-0.5">${displayEn}</h3>
                            <p class="text-[13px] text-gray-400 mb-4 truncate h-5">${displayAr}</p>
                            
                            <div class="mt-auto space-y-2">
                                ${wPrice > 0 ? `<div class="flex justify-between items-center"><span class="text-gray-500 text-[13px]">Washing:</span><span class="text-[#004b7c] font-bold text-sm">${wPrice.toFixed(2)} QAR</span></div>` : ''}
                                ${dPrice > 0 ? `<div class="flex justify-between items-center"><span class="text-gray-500 text-[13px]">Dry Clean:</span><span class="text-[#004b7c] font-bold text-sm">${dPrice.toFixed(2)} QAR</span></div>` : ''}
                                ${iPrice > 0 ? `<div class="flex justify-between items-center"><span class="text-gray-500 text-[13px]">Ironing:</span><span class="text-[#004b7c] font-bold text-sm">${iPrice.toFixed(2)} QAR</span></div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // 🌟 كرت الإضافة السريعة في آخر شبكة المنتجات 🌟
            html += `
                <div onclick="openItemModal()" class="bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 hover:border-[#007ec5] hover:bg-blue-50 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center h-full min-h-[250px] text-gray-400 hover:text-[#007ec5]">
                    <span class="text-4xl mb-2">+</span>
                    <span class="font-bold text-sm">Add New Item</span>
                </div>
            `;

            grid.innerHTML = html;
        }

        async function deleteItem(id, event) {
            event.stopPropagation();
            if(!confirm("Are you sure you want to delete this ITEM?")) return;
            
            try {
                // 🌟 التعديل الجذري: نستخدم PATCH لعمل (إخفاء للصنف) بدلاً من DELETE الذي يكسر قاعدة البيانات
                const res = await fetch(`/api/services/items/${id}/`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') 
                    },
                    body: JSON.stringify({ is_active: false }) // تحويل القطعة إلى غير نشطة
                });
                
                if(res.ok) {
                    fetchInitialData(); // تحديث الشاشة واختفاء القطعة فوراً
                } else {
                    const errorMsg = await res.text();
                    alert("Failed to delete item. Server details: " + errorMsg);
                }
            } catch(e) { 
                alert("Network Error while deleting item."); 
            }
        }

        function togglePriceInputs(type) {
            const isChecked = document.getElementById('has' + type).checked;
            const container = document.getElementById('inputs' + type);
            let prefix = type === 'Washing' ? 'wash' : type === 'DryClean' ? 'dry' : 'iron';
            if(isChecked) {
                container.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                container.classList.add('opacity-50', 'pointer-events-none');
                document.getElementById(prefix + 'Normal').value = '';
                document.getElementById(prefix + 'Express').value = '';
            }
        }

        function populateCategories(selectedId = null) {
            const select = document.getElementById('itemCategory');
            select.innerHTML = '<option value="">Select Category</option>';
            categories.forEach(c => {
                select.innerHTML += `<option value="${c.id}" ${selectedId == c.id ? 'selected' : ''}>${c.name}</option>`;
            });
        }

        function openItemModal() {
            document.getElementById('itemModal').classList.remove('hidden');
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('modal-title').innerText = 'Add New Item';
            populateCategories();
            ['Washing', 'DryClean', 'Ironing'].forEach(type => {
                document.getElementById('has' + type).checked = false;
                togglePriceInputs(type);
            });
        }

        function closeItemModal() {
            document.getElementById('itemModal').classList.add('hidden');
        }

        function openEditModal(id) {
            const item = allItems.find(i => String(i.id) === String(id));
            if (!item) return;

            openItemModal();
            document.getElementById('modal-title').innerText = 'Edit Item';
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemNameEn').value = item.name_en || item.name || '';
            document.getElementById('itemNameAr').value = (item.name && item.name !== item.name_en) ? item.name : '';
            
            populateCategories(item.category || item.category_id);

            let wPrice = parseFloat(item.washing_price) || 0;
            let dPrice = parseFloat(item.dry_cleaning_price) || 0;
            let iPrice = parseFloat(item.ironing_price) || 0;
            let wExpPrice = parseFloat(item.washing_express_price) || 0;
            let dExpPrice = parseFloat(item.dry_cleaning_express_price) || 0;
            let iExpPrice = parseFloat(item.ironing_express_price) || 0;

            if(wPrice > 0) {
                document.getElementById('hasWashing').checked = true;
                togglePriceInputs('Washing');
                document.getElementById('washNormal').value = wPrice;
                if(wExpPrice > 0) document.getElementById('washExpress').value = wExpPrice;
            }
            if(dPrice > 0) {
                document.getElementById('hasDryClean').checked = true;
                togglePriceInputs('DryClean');
                document.getElementById('dryNormal').value = dPrice;
                if(dExpPrice > 0) document.getElementById('dryExpress').value = dExpPrice;
            }
            if(iPrice > 0) {
                document.getElementById('hasIroning').checked = true;
                togglePriceInputs('Ironing');
                document.getElementById('ironNormal').value = iPrice;
                if(iExpPrice > 0) document.getElementById('ironExpress').value = iExpPrice;
            }
        }

        async function saveItem() {
            const btn = document.getElementById('btnSave');
            const id = document.getElementById('itemId').value;
            let catId = document.getElementById('itemCategory').value;

            const nameEn = document.getElementById('itemNameEn').value.trim();
            const nameAr = document.getElementById('itemNameAr').value.trim();

            if (!nameEn) { alert("Please enter the Item Name (English)"); return; }
            if (!catId) { alert("Please select a category from the dropdown. If you need a new one, use the '+ New Category' button on the main page."); return; }

            btn.innerText = 'Processing...'; btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('name_en', nameEn);
                formData.append('name', nameAr ? nameAr : nameEn); 
                formData.append('category', catId);
                formData.append('is_active', 'true'); 

                const imageFile = document.getElementById('itemImage').files[0];
                if(imageFile) formData.append('image', imageFile);

                // 🌟 تعديل الغسيل (Washing) 🌟
                if(document.getElementById('hasWashing').checked) {
                    formData.append('washing_price', document.getElementById('washNormal').value || 0);
                    formData.append('washing_express_price', document.getElementById('washExpress').value || 0);
                } else {
                    // إذا أزال علامة الصح، نرسل قيمة فارغة لمسح السعر من الداتابيز
                    formData.append('washing_price', '');
                    formData.append('washing_express_price', '');
                }

                // 🌟 تعديل الغسيل الجاف (Dry Clean) 🌟
                if(document.getElementById('hasDryClean').checked) {
                    formData.append('dry_cleaning_price', document.getElementById('dryNormal').value || 0);
                    formData.append('dry_cleaning_express_price', document.getElementById('dryExpress').value || 0);
                } else {
                    formData.append('dry_cleaning_price', '');
                    formData.append('dry_cleaning_express_price', '');
                }

                // 🌟 تعديل الكوي (Ironing) 🌟
                if(document.getElementById('hasIroning').checked) {
                    formData.append('ironing_price', document.getElementById('ironNormal').value || 0);
                    formData.append('ironing_express_price', document.getElementById('ironExpress').value || 0);
                } else {
                    formData.append('ironing_price', '');
                    formData.append('ironing_express_price', '');
                }

                const url = id ? `/api/services/items/${id}/` : `/api/services/items/`;
                const method = id ? 'PATCH' : 'POST';

                const res = await fetch(url, { method: method, headers: { 'X-CSRFToken': getCookie('csrftoken') }, body: formData });

                if(res.ok) {
                    alert('✅ Item saved successfully!');
                    closeItemModal();
                    fetchInitialData(); 
                } else {
                    const err = await res.json();
                    alert('❌ Error: ' + JSON.stringify(err));
                }
            } catch(e) { alert('Network Error: ' + e.message); } 
            finally { btn.innerText = 'Save Changes'; btn.disabled = false; }
        }

        // 🌟 دالة تحريك شريط التصنيفات بالأسهم 🌟
        function scrollCategories(amount) {
            const bar = document.getElementById('category-bar');
            bar.scrollBy({ left: amount, behavior: 'smooth' });
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        window.onload = fetchInitialData;

        // 🌟 ميزة التمرير الاحترافي لشريط التصنيفات (عجلة الماوس + السحب باليد) 🌟
        const catBar = document.getElementById('category-bar');
        
        // 1. التمرير بعجلة الماوس
        catBar.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                catBar.scrollLeft += e.deltaY * 1.5; // تسريع التمرير قليلاً
            }
        });

        // 2. السحب بالنقر (Drag to Scroll) مثل شاشات اللمس
        let isDown = false;
        let startX;
        let scrollLeft;

        catBar.addEventListener('mousedown', (e) => {
            isDown = true;
            catBar.style.cursor = 'grabbing'; // تغيير شكل الماوس ليد تقبض
            startX = e.pageX - catBar.offsetLeft;
            scrollLeft = catBar.scrollLeft;
        });
        
        catBar.addEventListener('mouseleave', () => { 
            isDown = false; 
            catBar.style.cursor = 'default';
        });
        
        catBar.addEventListener('mouseup', () => { 
            isDown = false; 
            catBar.style.cursor = 'default';
        });
        
        catBar.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - catBar.offsetLeft;
            const walk = (x - startX) * 2; // سرعة السحب باليد
            catBar.scrollLeft = scrollLeft - walk;
        });
        
    </script>
</body>
</html>
