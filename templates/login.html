<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Login - Laundry System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; margin: 0; background: linear-gradient(135deg, #007ec5, #004e82); }
        
        /* 🌊 فقاعات الصابون المتحركة (SVG Animation) */
        .bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; animation: float 10s infinite ease-in-out; }
        @keyframes float { 
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; } 
        }
        .b1 { width: 40px; height: 40px; left: 10%; animation-duration: 8s; }
        .b2 { width: 80px; height: 80px; left: 30%; animation-duration: 12s; animation-delay: 2s; }
        .b3 { width: 30px; height: 30px; left: 50%; animation-duration: 7s; animation-delay: 4s; }
        .b4 { width: 60px; height: 60px; left: 70%; animation-duration: 11s; animation-delay: 1s; }
        .b5 { width: 50px; height: 50px; left: 90%; animation-duration: 9s; animation-delay: 3s; }

        /* 🌊 الأمواج في الأسفل (SVG Wave) */
        .waves { position: absolute; bottom: 0; left: 0; width: 100%; height: 15vh; z-index: 0; pointer-events: none; }
        
        /* 💎 تأثير الزجاج المكسور للبطاقة */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative">

    <div class="bubbles">
        <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div>
        <div class="bubble b4"></div><div class="bubble b5"></div>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
            <use href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.1)" />
            <use href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.2)" />
            <use href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
            <use href="#gentle-wave" x="48" y="7" fill="#f0f4f8" />
        </g>
    </svg>

    <div class="glass-card rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition duration-500 hover:scale-[1.02]">
        <div class="p-8 text-center relative">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-cyan-400 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg border-4 border-white">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-gray-800 tracking-wider">Laundry System</h1>
            <p class="text-blue-600 font-bold mt-1 tracking-widest text-sm uppercase">Smart Laundry System</p>
        </div>

        <div class="px-8 pb-8">
            {% if messages %}
                {% for message in messages %}
                <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 mb-5 rounded text-sm font-bold text-center animate-pulse">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-5 relative z-10">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-blue-500">👤</span>
                        <input type="text" name="username" required class="w-full bg-white/80 border border-gray-200 rounded-xl pl-11 pr-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition font-bold text-gray-800" placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-blue-500">🔒</span>
                        <input type="password" name="password" required class="w-full bg-white/80 border border-gray-200 rounded-xl pl-11 pr-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition font-bold text-gray-800" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-[#007ec5] to-[#005f96] text-white rounded-xl py-3.5 font-black text-lg shadow-lg hover:shadow-blue-500/50 hover:scale-[1.02] transition duration-300 mt-2">
                    Enter System
                </button>
            </form>
        </div>
    </div>
</body>
</html>
